version: '3.8'

services:
  # Main Full-Stack Application Node Container
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:2717/ModernShop?replicaSet=rs0
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis

  # High-Availability Database Node
  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # Core Cache / Session Store Node
  redis:
    image: redis:7.0-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  mongo-data:
  redis-data:
